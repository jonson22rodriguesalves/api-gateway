# ============================================================================
# CONFIGURAĮÕES DA APLICAĮÃO API GATEWAY
# ============================================================================
# Autor: TechTaste
# Versão: 1.0
# Descriįão: Arquivo de propriedades para configuraįão do API Gateway
# ============================================================================

# ----------------------------------------------------------------------------
# CONFIGURAĮÕES GERAIS DA APLICAĮÃO SPRING BOOT
# ----------------------------------------------------------------------------

# Nome da aplicaįão - identifica o serviįo no service discovery e nos logs
# Este nome será utilizado para registro no Eureka e para identificaįão
# em métricas, tracing e monitoramento
spring.application.name=api-gateway
spring.config.import=configserver:http://localhost:8888
# Porta em que o servidor embarcado (Tomcat/Netty) irá escutar
# O gateway irá expor suas rotas e endpoints nesta porta
# Porta 8082 - padrão para API Gateway neste projeto
##server.port=8082

# ----------------------------------------------------------------------------
# CONFIGURAĮÕES DO CLIENTE EUREKA (SERVICE DISCOVERY)
# ----------------------------------------------------------------------------

# URL do servidor Eureka onde o cliente irá se registrar e descobrir serviįos
# O gateway irá se conectar ao Eureka Server rodando na porta 8081
# Esta é a zona padrão onde todos os microsserviįos se registram
##eureka.client.service-url.defaultZone=http://localhost:8081/eureka

# Habilita a busca do registro de serviįos no Eureka Server
# Quando true, o cliente periodicamente faz fetch do registry para descobrir
# outros serviįos disponíveis para roteamento
# Importante para o gateway saber quais serviįos estão disponíveis
##eureka.client.service-url.fetch-registry=true

# Habilita o registro automático deste serviįo no Eureka Server
# Quando true, o gateway se registra como um serviįo disponível,
# permitindo que outros serviįos o descubram também
##eureka.client.service-url.register-with-eureka=true

# ----------------------------------------------------------------------------
# CONFIGURAĮÕES DO SPRING CLOUD GATEWAY
# ----------------------------------------------------------------------------

# Habilita o localizador de serviįos via service discovery
# Quando true, o gateway automaticamente cria rotas baseadas nos serviįos
# registrados no Eureka, seguindo o padrão: /{service-id}/**
# Exemplo: http://localhost:8082/ms-usuarios/endpoint
##spring.cloud.gateway.discovery.locator.enabled=true

# Converte os nomes dos serviįos para letras minúsculas no roteamento
# Padroniza os nomes dos serviįos para evitar problemas de case-sensitive
# Exemplo: MS-USUARIOS -> /ms-usuarios, USERS-SERVICE -> /users-service
# Mantém compatibilidade com padrão REST de URLs em minúsculo
##spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ============================================================================
# OBSERVAĮÕES TÉCNICAS IMPORTANTES:
# ============================================================================
# 1. O gateway depende do Eureka Server para funcionar corretamente
# 2. Rotas são geradas automaticamente para todos os serviįos registrados
# 3. A ordem das propriedades não afeta a configuraįão final
# 4. Propriedades podem ser sobrescritas via variáveis de ambiente
# 5. Para ambientes de produįão, recomenda-se externalizar estas configs
# ============================================================================