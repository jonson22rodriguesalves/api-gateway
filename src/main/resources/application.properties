# ============================================================================
# CONFIGURAÇŐES DA APLICAÇĂO API GATEWAY
# ============================================================================
# Autor: TechTaste
# Versăo: 1.0
# Descriçăo: Arquivo de propriedades para configuraçăo do API Gateway
# ============================================================================

# ----------------------------------------------------------------------------
# CONFIGURAÇŐES GERAIS DA APLICAÇĂO SPRING BOOT
# ----------------------------------------------------------------------------

# Nome da aplicaçăo - identifica o serviço no service discovery e nos logs
# Este nome será utilizado para registro no Eureka e para identificaçăo
# em métricas, tracing e monitoramento
spring.application.name=api-gateway

# Porta em que o servidor embarcado (Tomcat/Netty) irá escutar
# O gateway irá expor suas rotas e endpoints nesta porta
# Porta 8082 - padrăo para API Gateway neste projeto
server.port=8082

# ----------------------------------------------------------------------------
# CONFIGURAÇŐES DO CLIENTE EUREKA (SERVICE DISCOVERY)
# ----------------------------------------------------------------------------

# URL do servidor Eureka onde o cliente irá se registrar e descobrir serviços
# O gateway irá se conectar ao Eureka Server rodando na porta 8081
# Esta é a zona padrăo onde todos os microsserviços se registram
eureka.client.service-url.defaultZone=http://localhost:8081/eureka

# Habilita a busca do registro de serviços no Eureka Server
# Quando true, o cliente periodicamente faz fetch do registry para descobrir
# outros serviços disponíveis para roteamento
# Importante para o gateway saber quais serviços estăo disponíveis
eureka.client.service-url.fetch-registry=true

# Habilita o registro automático deste serviço no Eureka Server
# Quando true, o gateway se registra como um serviço disponível,
# permitindo que outros serviços o descubram também
eureka.client.service-url.register-with-eureka=true

# ----------------------------------------------------------------------------
# CONFIGURAÇŐES DO SPRING CLOUD GATEWAY
# ----------------------------------------------------------------------------

# Habilita o localizador de serviços via service discovery
# Quando true, o gateway automaticamente cria rotas baseadas nos serviços
# registrados no Eureka, seguindo o padrăo: /{service-id}/**
# Exemplo: http://localhost:8082/ms-usuarios/endpoint
spring.cloud.gateway.discovery.locator.enabled=true

# Converte os nomes dos serviços para letras minúsculas no roteamento
# Padroniza os nomes dos serviços para evitar problemas de case-sensitive
# Exemplo: MS-USUARIOS -> /ms-usuarios, USERS-SERVICE -> /users-service
# Mantém compatibilidade com padrăo REST de URLs em minúsculo
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ============================================================================
# OBSERVAÇŐES TÉCNICAS IMPORTANTES:
# ============================================================================
# 1. O gateway depende do Eureka Server para funcionar corretamente
# 2. Rotas săo geradas automaticamente para todos os serviços registrados
# 3. A ordem das propriedades năo afeta a configuraçăo final
# 4. Propriedades podem ser sobrescritas via variáveis de ambiente
# 5. Para ambientes de produçăo, recomenda-se externalizar estas configs
# ============================================================================